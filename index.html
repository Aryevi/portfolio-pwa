<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<link rel="manifest" href="manifest.json">
<title>Portfolio Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:#2a2e42;--text:#e8eaf6;--muted:#6b7280;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --blue:#6366f1;--accent:#818cf8;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:50;background:rgba(15,17,23,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
.logo svg{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.time-badge{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.btn-refresh{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
.btn-refresh:hover{background:var(--bg3)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

main{max-width:500px;margin:0 auto;padding:12px 12px 80px}

.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-label{font-size:10px;color:var(--muted);margin-top:3px}

.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;gap:2px}
.tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--muted);transition:.2s;border:none;background:none}
.tab.active{background:var(--bg3);color:var(--text)}

.controls{display:flex;gap:8px;margin-bottom:10px}
.search{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.search:focus{border-color:var(--accent)}
.sort-sel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;outline:none}

.grid{display:grid;grid-template-columns:1fr;gap:8px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;user-select:none;position:relative}
.card:active{transform:scale(.97)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-left{display:flex;flex-direction:column;gap:3px}
.card-left .sym{font-weight:700;font-size:18px;line-height:1}
.card-left .name{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.card-left .con{font-size:10px;font-weight:700}
.card-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.card-right .price{font-weight:700;font-size:20px;line-height:1}
.card-right .chg{font-size:13px;font-weight:600}
.card-extra{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.card-extra-item{display:flex;flex-direction:column;gap:2px}
.card-extra-label{font-size:9px;color:var(--muted);text-align:center}
.card-extra-val{font-size:11px;font-weight:600;text-align:center}
.earn-badge{display:inline-block;font-size:9px;font-weight:700;background:rgba(245,158,11,.15);color:var(--amber);padding:1px 6px;border-radius:4px;margin-top:3px;vertical-align:middle;line-height:1.4}

.earn-list{display:flex;flex-direction:column;gap:6px}
.earn-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.earn-row.today{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.earn-row.soon{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.2)}
.earn-left .esym{font-weight:700;font-size:14px}
.earn-left .eeps{font-size:10px;color:var(--muted);margin-top:2px}
.earn-right{text-align:left}
.earn-right .edate{font-size:12px;font-weight:600}
.earn-right .edays{font-size:10px;color:var(--muted);margin-top:2px}
.month-hdr{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px 4px}

.anal-list{display:flex;flex-direction:column;gap:8px}
.anal-row{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px}
.anal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.anal-sym{font-weight:700;font-size:14px}
.anal-con{font-size:11px;font-weight:600;margin-right:6px}
.bar{height:6px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:4px}
.bar-bull{background:var(--green);height:100%}
.bar-neu{background:var(--amber);height:100%}
.bar-bear{background:var(--red);height:100%}
.anal-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}

.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;display:none}
.overlay.open{display:block}
.overlay-inner{max-width:500px;margin:0 auto;padding:16px 16px 80px}
.overlay-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.overlay-sym{font-size:24px;font-weight:700}
.overlay-name{font-size:11px;color:var(--muted);margin-top:2px}
.btn-close{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;flex-shrink:0}

.block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.block-title{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:10px;color:var(--accent)}
.price-big{font-size:32px;font-weight:700}
.price-chg{font-size:15px;font-weight:600;margin-top:2px}
.range-bar{height:6px;background:var(--bg3);border-radius:3px;position:relative;margin:8px 0}
.range-fill{height:100%;background:var(--accent);border-radius:3px;position:absolute;top:0;left:0}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{background:var(--bg3);border-radius:10px;padding:8px}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:13px;font-weight:700}
.targets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.target-box{background:var(--bg3);border-radius:10px;padding:10px}
.target-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.target-val{font-size:17px;font-weight:700}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.breakdown-row:last-child{border-bottom:none}

footer{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px 16px}
.footer-inner{max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}

.manage-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px}
.manage-title{font-weight:700;font-size:16px;margin-bottom:4px}
.manage-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.add-row{display:flex;gap:8px;margin-bottom:14px}
.add-btn{background:var(--blue);border:none;color:#fff;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:active{opacity:.8}
.ticker-chip{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:10px;padding:9px 12px;margin-bottom:6px}
.chip-sym{font-weight:700;font-size:14px}
.chip-remove{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.chip-remove:hover{color:var(--red)}
.refresh-all-btn{width:100%;margin-top:10px;background:var(--green);border:none;color:#fff;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer}
.refresh-all-btn:active{opacity:.8}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.price-flash-up{animation:flashUp .4s ease}
.price-flash-down{animation:flashDown .4s ease}
@keyframes flashUp{0%{color:var(--green)}100%{}}
@keyframes flashDown{0%{color:var(--red)}100%{}}
.news-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;text-decoration:none;display:block;color:inherit}
.news-item:active{opacity:.8}
.news-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.news-sym{font-size:10px;font-weight:700;color:var(--accent);flex-shrink:0}
.news-time{font-size:10px;color:var(--muted);flex-shrink:0}
.news-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px}
.news-summary{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.news-body{display:flex;gap:10px}
.news-text{flex:1}
.profile-block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.profile-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.profile-logo{width:40px;height:40px;border-radius:8px;object-fit:contain;background:var(--bg3);padding:4px}
.profile-name{font-size:13px;font-weight:700}
.profile-meta{font-size:11px;color:var(--muted);margin-top:2px}
.profile-desc{font-size:11px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.muted{color:var(--muted)}.accent{color:var(--accent)}

.load-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.load-bar.active{display:block}
.load-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s ease}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Portfolio Tracker
    </div>
    <div id="live-badge" style="font-size:10px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:3px;margin-right:auto;padding-right:8px"></div>
    <div class="header-right">
      <span class="time-badge" id="last-update">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        טוען...
      </span>
      <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        רענן
      </button>
    </div>
  </div>
</header>

<main>
  <div class="load-bar" id="load-bar"><div class="load-fill" id="load-fill" style="width:0%"></div></div>

  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-val green" id="kpi-up">—</div><div class="kpi-label">עולות</div></div>
    <div class="kpi"><div class="kpi-val red"   id="kpi-down">—</div><div class="kpi-label">יורדות</div></div>
    <div class="kpi"><div class="kpi-val amber" id="kpi-earn">—</div><div class="kpi-label">דוחות קרובים</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stocks')">מניות</button>
    <button class="tab" onclick="switchTab('news')">חדשות</button>
    <button class="tab" onclick="switchTab('earnings')">דוחות</button>
    <button class="tab" onclick="switchTab('analysts')">אנליסטים</button>
    <button class="tab" onclick="switchTab('manage')">&#9881;</button>
  </div>

  <div id="tab-stocks">
    <div class="controls">
      <input class="search" type="search" placeholder="חפש מניה..." oninput="renderStocks()" id="search-input">
      <select class="sort-sel" onchange="renderStocks()" id="sort-sel">
        <option value="change">שינוי%</option>
        <option value="alpha">A-Z</option>
      </select>
    </div>
    <div class="grid" id="stocks-grid"></div>
  </div>

  <div id="tab-earnings" style="display:none">
    <div id="earnings-list"></div>
  </div>

  <div id="tab-analysts" style="display:none">
    <div class="anal-list" id="analysts-list"></div>
  </div>

  <div id="tab-news" style="display:none">
    <div class="controls" style="margin-bottom:10px">
      <select class="sort-sel" style="flex:1" onchange="filterNews()" id="news-filter">
        <option value="all">כל המניות</option>
      </select>
    </div>
    <div id="news-list"></div>
  </div>

  <div id="tab-manage" style="display:none">
    <div class="manage-box">
      <div class="manage-title">נהל מניות</div>
      <div class="manage-sub">הוסף או הסר מניות מהתיק שלך</div>
      <div class="add-row">
        <input class="search" type="text" id="add-input" placeholder="סימול AAPL, NVDA..." style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')addTicker()">
        <button class="add-btn" onclick="addTicker()">הוסף</button>
      </div>
      <div id="ticker-list"></div>
      <button class="refresh-all-btn" onclick="saveAndRefresh()">שמור ורענן נתונים</button>
    </div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-inner" id="overlay-inner"></div>
</div>

<footer>
  <div class="footer-inner">
    <span id="footer-time">טוען נתונים...</span>
    <span id="footer-count" class="accent"></span>
  </div>
</footer>

<script>
// ─── Config ───────────────────────────────────────────────────────────
const FINNHUB_KEY = 'd7kngrpr01qiqbcv385gd7kngrpr01qiqbcv3860';
const TWELVE_KEY  = '2aa7f6d30ddc437ba7ba1c668df1ebcb';
const DEFAULT_TICKERS = ['AMD','TSM','ORCL','STLD','AAPL','EXE','GOOGL','MSFT','AA','QQQ','AMP','FLR','CMCSA','PYPL','WMT','MRK','TSLA','KFY','SAR','BIDU','COST','SNY','IBM','HPQ','WIMI'];
let TICKERS = JSON.parse(localStorage.getItem('portfolio_tickers')||'null') || DEFAULT_TICKERS.slice();
const MONTHS  = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ─── State ────────────────────────────────────────────────────────────
let state = { quotes:{}, analysts:{}, earnings:{}, news:{}, profiles:{}, lastFetch:0, loading:false };
let currentTab = 'stocks';

// ─── Utils ────────────────────────────────────────────────────────────
const fmt$   = n => (n!=null && !isNaN(n) && n!==0) ? '$'+parseFloat(n).toFixed(2) : '—';
const fmtPct = n => { if(n==null||isNaN(n)) return '—'; const v=parseFloat(n); return (v>=0?'+':'')+v.toFixed(2)+'%'; };
const clr    = n => !n||isNaN(n) ? 'muted' : parseFloat(n)>0 ? 'green' : parseFloat(n)<0 ? 'red' : 'muted';
const daysTo = ts => ts ? Math.ceil((ts*1000 - Date.now())/86400000) : null;
const timeAgo= ts => { const s=Math.round((Date.now()-ts)/1000); if(s<60) return `לפני ${s}ש׳`; if(s<3600) return `לפני ${Math.round(s/60)} דק׳`; return `לפני ${Math.round(s/3600)} שע׳`; };
const delay  = ms => new Promise(r=>setTimeout(r,ms));

function conLabel(r){
  const m={strongBuy:'STRONG BUY',buy:'BUY',hold:'HOLD',neutral:'NEUTRAL',sell:'SELL',strongSell:'STRONG SELL'};
  return m[r]||(r||'').toUpperCase()||'—';
}
function conColor(r){
  const l=(r||'').toLowerCase();
  if(l.includes('strongbuy')||l==='strong_buy'||l==='strongbuy') return 'green';
  if(l==='buy') return 'green';
  if(l==='hold'||l==='neutral') return 'amber';
  if(l.includes('sell')) return 'red';
  return 'muted';
}
function adjTarget(price, bullPct, neutralPct, bearPct){
  if(!price||isNaN(price)) return null;
  // Model: weighted implied upside
  // strongBull → +15%, neutral → +3%, bear → -5%
  const implied = (bullPct*0.15 + neutralPct*0.03 + bearPct*(-0.05)) / 100;
  return parseFloat((price*(1+implied)).toFixed(2));
}

// Progress bar
function setProgress(pct){
  const bar = document.getElementById('load-bar');
  const fill = document.getElementById('load-fill');
  if(!bar||!fill) return;
  if(pct>=100){ bar.classList.remove('active'); fill.style.width='0%'; return; }
  bar.classList.add('active');
  fill.style.width = pct+'%';
}

// ─── Finnhub Quote (primary price source — 60 calls/min free) ─────────
async function loadQuoteFinnhub(ticker){
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`);
    if(!r.ok) return false;
    const d = await r.json();
    if(!d || !d.c || d.c === 0) return false;
    state.quotes[ticker] = {
      price:    d.c,                        // current price
      chgPct:   d.dp,                       // % change
      chg:      d.d,                        // absolute change
      dayHigh:  d.h,
      dayLow:   d.l,
      open:     d.o,
      prevClose:d.pc,
      high52w:  0,
      low52w:   0,
      volume:   0,
      name:     ticker,
    };
    return true;
  } catch(e){ return false; }
}

// Twelve Data fallback for tickers that Finnhub couldn't load
// Free plan: 8 credits/min. Batch max 8.
async function loadQuotesTwelveBatch(tickers){
  if(!tickers.length) return;
  const symbols = tickers.slice(0,8).join(',');
  try {
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=${symbols}&apikey=${TWELVE_KEY}`);
    const data = await r.json();
    if(data.status==='error'||data.code===429) return; // rate limited — skip
    tickers.slice(0,8).forEach(t => {
      const d = data[t] || (data.symbol===t ? data : null);
      if(!d||d.status==='error') return;
      state.quotes[t] = {
        price:    parseFloat(d.close||0),
        chgPct:   parseFloat(d.percent_change||0),
        chg:      parseFloat(d.change||0),
        dayHigh:  parseFloat(d.high||0),
        dayLow:   parseFloat(d.low||0),
        high52w:  parseFloat((d.fifty_two_week||{}).high||0),
        low52w:   parseFloat((d.fifty_two_week||{}).low||0),
        open:     parseFloat(d.open||0),
        prevClose:parseFloat(d.previous_close||0),
        volume:   parseInt(d.volume||0),
        name:     d.name||t,
      };
    });
  } catch(e){}
}

async function loadAllQuotes(){
  // Load all tickers via Finnhub /quote in parallel batches of 15
  // (60 calls/min → 15 per 15s → safe margin)
  const BATCH = 15;
  let loaded = 0;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(async t => {
      const ok = await loadQuoteFinnhub(t);
      if(ok) loaded++;
    }));
    renderStocks(); // show data after each batch
    setProgress(Math.round(((i+BATCH)/TICKERS.length)*50)); // first 50% for quotes
    if(i+BATCH < TICKERS.length) await delay(1100); // safe spacing
  }

  // For any ticker that failed, try Twelve Data as fallback
  const missing = TICKERS.filter(t => !state.quotes[t] || state.quotes[t].price===0);
  if(missing.length > 0){
    await loadQuotesTwelveBatch(missing);
    if(missing.length > 8) await delay(62000); // wait for rate limit reset if needed
    if(missing.length > 8) await loadQuotesTwelveBatch(missing.slice(8));
    renderStocks();
  }
}

// ─── Finnhub: 52W High/Low via /stock/metric ────────────────────────
async function load52W(ticker){
  try {
    const r = await fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=all&token=${FINNHUB_KEY}`);
    if(!r.ok) return;
    const d = await r.json();
    const m = d.metric || {};
    if(state.quotes[ticker]){
      state.quotes[ticker].high52w = m['52WeekHigh'] || 0;
      state.quotes[ticker].low52w  = m['52WeekLow']  || 0;
    }
  } catch(e){}
}

async function loadAll52W(){
  const BATCH = 10;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(t => load52W(t)));
    renderStocks();
    if(i+BATCH < TICKERS.length) await delay(1200);
  }
}

// ─── Finnhub: analyst recommendations + earnings ────────────────────
async function loadAnalystSingle(ticker){
  try {
    const [recResp, earnResp] = await Promise.all([
      fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${ticker}&from=2026-01-01&to=2027-12-31&token=${FINNHUB_KEY}`)
    ]);

    // Analyst recommendations
    if(recResp.ok){
      const recs = await recResp.json();
      const latest = Array.isArray(recs) && recs[0];
      if(latest){
        const sb=latest.strongBuy||0, b=latest.buy||0, h=latest.hold||0,
              s=latest.sell||0,     ss=latest.strongSell||0;
        const total = sb+b+h+s+ss;
        if(total > 0){
          const bullPct    = Math.round((sb+b)/total*100);
          const neutralPct = Math.round(h/total*100);
          const bearPct    = Math.round((s+ss)/total*100);
          const price      = state.quotes[ticker]?.price || 0;
          const target     = adjTarget(price, bullPct, neutralPct, bearPct);

          let rec = 'hold';
          if(bullPct >= 60) rec = bullPct>=80 ? 'strongBuy' : 'buy';
          else if(bearPct >= 40) rec = bearPct>=60 ? 'strongSell' : 'sell';

          state.analysts[ticker] = {
            recommendation: rec,
            numAnalysts: total,
            strongBuy:sb, buy:b, hold:h, sell:s, strongSell:ss,
            bullPct, neutralPct, bearPct,
            derivedTarget: target,
            period: latest.period
          };
        }
      }
    }

    // Earnings calendar
    if(earnResp.ok){
      const earn = await earnResp.json();
      const cal  = (earn.earningsCalendar||[]);
      const now  = Date.now()/1000;
      const upcoming = cal
        .filter(e => new Date(e.date).getTime()/1000 > now - 86400)
        .sort((a,b)=>new Date(a.date)-new Date(b.date));
      if(upcoming.length){
        const next = upcoming[0];
        state.earnings[ticker] = {
          date:        next.date,
          ts:          new Date(next.date).getTime()/1000,
          epsEstimate: next.epsEstimate,
          revEstimate: next.revenueEstimate
        };
      }
    }
  } catch(e){}
}

async function loadAllAnalysts(){
  // Finnhub free: 60 calls/min. 25 tickers × 2 calls = 50 calls.
  // Run in batches of 10 with 1.5s spacing.
  const BATCH = 10;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(t => loadAnalystSingle(t)));
    const pct = 50 + Math.round(((i+BATCH)/TICKERS.length)*50);
    setProgress(Math.min(99, pct));
    renderAll();
    if(i+BATCH < TICKERS.length) await delay(1500);
  }
}

// ─── Refresh ──────────────────────────────────────────────────────────
async function refreshAll(){
  if(state.loading) return;
  state.loading = true;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  setProgress(5);

  // Show skeletons only on first ever load
  if(!Object.keys(state.quotes).length){
    document.getElementById('stocks-grid').innerHTML =
      Array.from({length:10}).map(()=>`<div class="skel" style="height:90px"></div>`).join('');
  }
  document.getElementById('footer-time').textContent = 'מעדכן...';

  try {
    // Phase 1: Load all prices via Finnhub /quote (fast, parallel)
    await loadAllQuotes();
    renderStocks();

    // Phase 2: Load all secondary data in parallel
    await Promise.all([loadAll52W(), loadAllAnalysts(), loadAllProfiles(), loadAllNews()]);

    state.lastFetch = Date.now();
  } catch(e){
    console.error('Refresh error:', e);
  } finally {
    state.loading = false;
    btn.classList.remove('spinning');
    setProgress(100);
    renderAll();
    updateFooter();
  }
}

function renderEarnings(){
  const el = document.getElementById('earnings-list');
  const entries = Object.entries(state.earnings)
    .filter(([,e])=>e.ts)
    .sort(([,a],[,b])=>a.ts-b.ts);

  if(!entries.length){
    el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">${state.loading?'טוען דוחות...':'אין דוחות מתוכננים'}</div>`;
    return;
  }

  const groups={};
  entries.forEach(([t,e])=>{
    const d=new Date(e.ts*1000);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key]) groups[key]=[];
    groups[key].push([t,e]);
  });

  el.innerHTML=Object.entries(groups).map(([key,rows])=>{
    const [yr,mo]=key.split('-');
    const hdr=`<div class="month-hdr">${MONTHS[parseInt(mo)-1]} ${yr}</div>`;
    const items=rows.map(([t,e])=>{
      const days=daysTo(e.ts);
      const cls=days===0?'today':(days!=null&&days>0&&days<=7?'soon':'');
      const badge=days===0?'<span class="earn-badge">היום</span>':(days!=null&&days>0&&days<=7?`<span class="earn-badge">${days}י׳</span>`:'');
      const eps = e.epsEstimate!=null&&e.epsEstimate!=='' ? `תחזית EPS: $${parseFloat(e.epsEstimate).toFixed(2)}` : '';
      return `<div class="earn-row ${cls}">
        <div class="earn-left">
          <div class="esym">${t} ${badge}</div>
          ${eps?`<div class="eeps">${eps}</div>`:''}
        </div>
        <div class="earn-right">
          <div class="edate">${e.date}</div>
          <div class="edays">${days===0?'היום!':days!=null&&days>0?`${days} ימים`:'עבר'}</div>
        </div>
      </div>`;
    }).join('');
    return hdr+`<div class="earn-list">${items}</div>`;
  }).join('');
}

function renderNews(){
  const el = document.getElementById('news-list');
  const filter = document.getElementById('news-filter')?.value || 'all';
  if(!el) return;

  // Update filter dropdown
  const sel = document.getElementById('news-filter');
  if(sel && sel.options.length === 1){
    TICKERS.forEach(t => {
      if(state.news[t]?.length){
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        sel.appendChild(opt);
      }
    });
  }

  // Collect all news
  let allNews = [];
  const tickers = filter==='all' ? TICKERS : [filter];
  tickers.forEach(t => {
    (state.news[t]||[]).forEach(n => allNews.push({...n, ticker:t}));
  });
  allNews.sort((a,b) => b.datetime - a.datetime);

  if(!allNews.length){
    el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">${state.loading?'טוען חדשות...':'אין חדשות'}</div>`;
    return;
  }

  const timeStr = ts => {
    const d = new Date(ts*1000);
    const now = Date.now()/1000;
    const diff = now - ts;
    if(diff < 60)    return 'עכשיו';
    if(diff < 3600)  return 'לפני ' + Math.round(diff/60) + ' דק׳';
    if(diff < 86400) return 'לפני ' + Math.round(diff/3600) + ' ש׳';
    return d.toLocaleDateString('he-IL',{day:'numeric',month:'short'});
  };

  el.innerHTML = allNews.map(n => `
    <a class="news-item" href="${n.url}" target="_blank" rel="noopener">
      <div class="news-header">
        <span class="news-sym">${n.ticker}</span>
        <span class="news-time">${n.source} · ${timeStr(n.datetime)}</span>
      </div>
      <div class="news-body">
        <div class="news-text">
          <div class="news-title">${n.headline}</div>
          ${n.summary?`<div class="news-summary">${n.summary}</div>`:''}
        </div>
        ${n.image?`<img class="news-img" src="${n.image}" onerror="this.style.display='none'" loading="lazy">`:''}
      </div>
    </a>`).join('');
}

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
        חדשות אחרונות
      </div>
      ${tickerNews.map(n=>`
        <a href="${n.url}" target="_blank" rel="noopener" style="display:block;padding:8px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
          <div style="font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px">${n.headline}</div>
          <div style="font-size:10px;color:var(--muted)">${n.source} · ${timeStr(n.datetime)}</div>
        </a>`).join('')}
    </div>`;
  }

  document.getElementById('overlay-inner').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

// ─── Manage tickers ──────────────────────────────────────────────────
function saveTickers(){
  localStorage.setItem('portfolio_tickers', JSON.stringify(TICKERS));
}

function addTicker(){
  const input = document.getElementById('add-input');
  const sym = input.value.trim().toUpperCase().replace(/[^A-Z.]/g,'');
  if(!sym){ return; }
  if(TICKERS.includes(sym)){ input.value=''; return; }
  TICKERS.push(sym);
  saveTickers();
  input.value = '';
  renderTickerList();
}

function removeTicker(sym){
  TICKERS = TICKERS.filter(t => t !== sym);
  // Clear stale state for removed ticker
  delete state.quotes[sym];
  delete state.analysts[sym];
  delete state.earnings[sym];
  saveTickers();
  renderTickerList();
  renderAll();
}

function saveAndRefresh(){
  saveTickers();
  state.quotes = {};
  state.analysts = {};
  state.earnings = {};
  switchTab('stocks');
  refreshAll().then(() => resubscribeWS());
}

function renderTickerList(){
  const el = document.getElementById('ticker-list');
  if(!el) return;
  el.innerHTML = TICKERS.map(t => `
    <div class="ticker-chip">
      <span class="chip-sym">${t}</span>
      <button class="chip-remove" onclick="removeTicker('${t}')" title="הסר">×</button>
    </div>`).join('');
}

function switchTab(tab){
  currentTab=tab;
  ['stocks','news','earnings','analysts','manage'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['stocks','news','earnings','analysts','manage'][i]===tab);
  });
  if(tab==='manage') renderTickerList();
  if(tab==='news') renderNews();
}

function updateFooter(){
  const cnt=Object.keys(state.quotes).filter(t=>state.quotes[t]?.price>0).length;
  document.getElementById('footer-count').textContent=cnt?`${cnt} מניות טעונות`:'';
  if(state.lastFetch){
    document.getElementById('footer-time').textContent=`עודכן ${timeAgo(state.lastFetch)} • רענון כל 5 דק׳`;
    document.getElementById('last-update').innerHTML=
      `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${timeAgo(state.lastFetch)}`;
  }
}

// ─── Company Profile ────────────────────────────────────────────────
async function loadProfile(ticker){
  try {
    const r = await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${ticker}&token=${FINNHUB_KEY}`);
    if(!r.ok) return;
    const d = await r.json();
    if(d && d.name) state.profiles[ticker] = {
      name:        d.name,
      logo:        d.logo,
      industry:    d.finnhubIndustry,
      exchange:    d.exchange,
      marketCap:   d.marketCapitalization, // in millions
      employees:   d.employeeTotal,
      weburl:      d.weburl,
      country:     d.country,
    };
  } catch(e){}
}

async function loadAllProfiles(){
  const BATCH = 10;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(t => loadProfile(t)));
    // Update card names from profiles
    TICKERS.forEach(t => {
      if(state.profiles[t] && state.quotes[t])
        state.quotes[t].name = state.profiles[t].name;
    });
    renderStocks();
    if(i+BATCH < TICKERS.length) await delay(1200);
  }
}

// ─── Company News ────────────────────────────────────────────────────
async function loadNewsSingle(ticker){
  try {
    const to   = new Date().toISOString().slice(0,10);
    const from = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
    const r = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
    if(!r.ok) return;
    const items = await r.json();
    if(Array.isArray(items) && items.length)
      state.news[ticker] = items.slice(0,5).map(n=>({
        id:       n.id,
        headline: n.headline,
        summary:  n.summary,
        url:      n.url,
        image:    n.image,
        datetime: n.datetime,
        source:   n.source,
      }));
  } catch(e){}
}

async function loadAllNews(){
  const BATCH = 8;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(t => loadNewsSingle(t)));
    if(currentTab==='news') renderNews();
    if(i+BATCH < TICKERS.length) await delay(1500);
  }
}

// ─── WebSocket Live Prices (Finnhub) ────────────────────────────────
let ws = null;
let wsReady = false;

function connectWS(){
  if(ws && ws.readyState <= 1) return; // already open/connecting
  ws = new WebSocket(`wss://ws.finnhub.io?token=${FINNHUB_KEY}`);

  ws.onopen = () => {
    wsReady = true;
    TICKERS.forEach(t => ws.send(JSON.stringify({type:'subscribe', symbol:t})));
    setLiveBadge(true);
    console.log('WS connected, subscribed to', TICKERS.length, 'tickers');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if(msg.type !== 'trade' || !msg.data) return;
    msg.data.forEach(trade => {
      const t = trade.s;
      if(!state.quotes[t]) return;
      const oldPrice = state.quotes[t].price;
      const newPrice = trade.p;
      if(newPrice === oldPrice) return;
      // Update state
      state.quotes[t].chg    = parseFloat((newPrice - state.quotes[t].prevClose).toFixed(4));
      state.quotes[t].chgPct = parseFloat(((newPrice - state.quotes[t].prevClose) / state.quotes[t].prevClose * 100).toFixed(4));
      state.quotes[t].price  = newPrice;
      // Flash the card price in DOM directly (no full re-render)
      updateCardPrice(t, newPrice, oldPrice);
    });
  };

  ws.onerror = () => { wsReady = false; setLiveBadge(false); };
  ws.onclose = () => {
    wsReady = false;
    setLiveBadge(false);
    // Reconnect after 5s
    setTimeout(connectWS, 5000);
  };
}

function updateCardPrice(ticker, newPrice, oldPrice){
  // Find card and update price + change in-place
  const cards = document.querySelectorAll('.card');
  for(const card of cards){
    const sym = card.querySelector('.sym');
    if(!sym || !sym.textContent.startsWith(ticker)) continue;
    const priceEl = card.querySelector('.price');
    const chgEl   = card.querySelector('.chg');
    if(priceEl){
      priceEl.textContent = '$' + newPrice.toFixed(2);
      priceEl.classList.remove('price-flash-up','price-flash-down');
      void priceEl.offsetWidth; // reflow
      priceEl.classList.add(newPrice >= oldPrice ? 'price-flash-up' : 'price-flash-down');
    }
    const q = state.quotes[ticker];
    if(chgEl && q){
      chgEl.textContent = (q.chgPct>=0?'+':'') + q.chgPct.toFixed(2) + '%';
      chgEl.className = 'chg ' + (q.chgPct>0?'green':q.chgPct<0?'red':'muted');
    }
    break;
  }
  // Update KPIs occasionally
  renderKPIs();
}

function setLiveBadge(live){
  const el = document.getElementById('live-badge');
  if(!el) return;
  el.innerHTML = live
    ? '<span class="live-dot"></span>LIVE'
    : '<span style="color:var(--muted);font-size:10px">מחכה לחיבור...</span>';
}

// Resubscribe when tickers change
function resubscribeWS(){
  if(!ws || ws.readyState !== 1) { connectWS(); return; }
  // Unsubscribe all, re-subscribe current
  TICKERS.forEach(t => ws.send(JSON.stringify({type:'unsubscribe', symbol:t})));
  TICKERS.forEach(t => ws.send(JSON.stringify({type:'subscribe',   symbol:t})));
}

// Auto-refresh full data every 5 minutes (prices via WS, but analysts/earnings need refresh)
setInterval(()=>{ if(!state.loading) refreshAll(); }, 300000);
setInterval(updateFooter, 30000);

// Boot
refreshAll().then(() => connectWS());
</script>
