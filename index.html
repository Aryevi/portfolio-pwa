<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<link rel="manifest" href="manifest.json">
<title>Portfolio Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
  --border:#2a2e42;--text:#e8eaf6;--muted:#6b7280;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --blue:#6366f1;--accent:#818cf8;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:50;background:rgba(15,17,23,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px}
.header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
.logo svg{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.time-badge{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.btn-refresh{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
.btn-refresh:hover{background:var(--bg3)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

main{max-width:500px;margin:0 auto;padding:12px 12px 80px}

.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-label{font-size:10px;color:var(--muted);margin-top:3px}

.tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;gap:2px}
.tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--muted);transition:.2s;border:none;background:none}
.tab.active{background:var(--bg3);color:var(--text)}

.controls{display:flex;gap:8px;margin-bottom:10px}
.search{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.search:focus{border-color:var(--accent)}
.sort-sel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;outline:none}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;user-select:none;position:relative}
.card:active{transform:scale(.97)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-left .sym{font-weight:700;font-size:14px}
.card-left .con{font-size:10px;font-weight:600;margin-top:2px}
.card-right{text-align:left}
.card-right .price{font-weight:700;font-size:13px}
.card-right .chg{font-size:11px;font-weight:600}
.card-extra{font-size:10px;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
.earn-badge{font-size:9px;font-weight:700;background:rgba(245,158,11,.15);color:var(--amber);padding:1px 5px;border-radius:4px;margin-right:3px;vertical-align:middle}

.earn-list{display:flex;flex-direction:column;gap:6px}
.earn-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.earn-row.today{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
.earn-row.soon{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.2)}
.earn-left .esym{font-weight:700;font-size:14px}
.earn-left .eeps{font-size:10px;color:var(--muted);margin-top:2px}
.earn-right{text-align:left}
.earn-right .edate{font-size:12px;font-weight:600}
.earn-right .edays{font-size:10px;color:var(--muted);margin-top:2px}
.month-hdr{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px 4px}

.anal-list{display:flex;flex-direction:column;gap:8px}
.anal-row{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px}
.anal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.anal-sym{font-weight:700;font-size:14px}
.anal-con{font-size:11px;font-weight:600;margin-right:6px}
.bar{height:6px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:4px}
.bar-bull{background:var(--green);height:100%}
.bar-neu{background:var(--amber);height:100%}
.bar-bear{background:var(--red);height:100%}
.anal-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}

.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;display:none}
.overlay.open{display:block}
.overlay-inner{max-width:500px;margin:0 auto;padding:16px 16px 80px}
.overlay-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.overlay-sym{font-size:24px;font-weight:700}
.overlay-name{font-size:11px;color:var(--muted);margin-top:2px}
.btn-close{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;flex-shrink:0}

.block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.block-title{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:10px;color:var(--accent)}
.price-big{font-size:32px;font-weight:700}
.price-chg{font-size:15px;font-weight:600;margin-top:2px}
.range-bar{height:6px;background:var(--bg3);border-radius:3px;position:relative;margin:8px 0}
.range-fill{height:100%;background:var(--accent);border-radius:3px;position:absolute;top:0;left:0}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{background:var(--bg3);border-radius:10px;padding:8px}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:13px;font-weight:700}
.targets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.target-box{background:var(--bg3);border-radius:10px;padding:10px}
.target-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.target-val{font-size:17px;font-weight:700}
.breakdown-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.breakdown-row:last-child{border-bottom:none}

footer{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px 16px}
.footer-inner{max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}

.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.muted{color:var(--muted)}.accent{color:var(--accent)}

.load-bar{height:3px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.load-bar.active{display:block}
.load-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s ease}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Portfolio Tracker
    </div>
    <div class="header-right">
      <span class="time-badge" id="last-update">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        טוען...
      </span>
      <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        רענן
      </button>
    </div>
  </div>
</header>

<main>
  <div class="load-bar" id="load-bar"><div class="load-fill" id="load-fill" style="width:0%"></div></div>

  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-val green" id="kpi-up">—</div><div class="kpi-label">עולות</div></div>
    <div class="kpi"><div class="kpi-val red"   id="kpi-down">—</div><div class="kpi-label">יורדות</div></div>
    <div class="kpi"><div class="kpi-val amber" id="kpi-earn">—</div><div class="kpi-label">דוחות קרובים</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stocks')">מניות</button>
    <button class="tab" onclick="switchTab('earnings')">דוחות</button>
    <button class="tab" onclick="switchTab('analysts')">אנליסטים</button>
  </div>

  <div id="tab-stocks">
    <div class="controls">
      <input class="search" type="search" placeholder="חפש מניה..." oninput="renderStocks()" id="search-input">
      <select class="sort-sel" onchange="renderStocks()" id="sort-sel">
        <option value="change">שינוי%</option>
        <option value="alpha">A-Z</option>
      </select>
    </div>
    <div class="grid" id="stocks-grid"></div>
  </div>

  <div id="tab-earnings" style="display:none">
    <div id="earnings-list"></div>
  </div>

  <div id="tab-analysts" style="display:none">
    <div class="anal-list" id="analysts-list"></div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-inner" id="overlay-inner"></div>
</div>

<footer>
  <div class="footer-inner">
    <span id="footer-time">טוען נתונים...</span>
    <span id="footer-count" class="accent"></span>
  </div>
</footer>

<script>
// ─── Config ───────────────────────────────────────────────────────────
const FINNHUB_KEY = 'd7kngrpr01qiqbcv385gd7kngrpr01qiqbcv3860';
const TWELVE_KEY  = '2aa7f6d30ddc437ba7ba1c668df1ebcb';
const TICKERS = ['AMD','TSM','ORCL','STLD','AAPL','EXE','GOOGL','MSFT','AA','QQQ','AMP','FLR','CMCSA','PYPL','WMT','MRK','TSLA','KFY','SAR','BIDU','COST','SNY','IBM','HPQ','WIMI'];
const MONTHS  = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ─── State ────────────────────────────────────────────────────────────
let state = { quotes:{}, analysts:{}, earnings:{}, lastFetch:0, loading:false };
let currentTab = 'stocks';

// ─── Utils ────────────────────────────────────────────────────────────
const fmt$   = n => (n!=null && !isNaN(n) && n!==0) ? '$'+parseFloat(n).toFixed(2) : '—';
const fmtPct = n => { if(n==null||isNaN(n)) return '—'; const v=parseFloat(n); return (v>=0?'+':'')+v.toFixed(2)+'%'; };
const clr    = n => !n||isNaN(n) ? 'muted' : parseFloat(n)>0 ? 'green' : parseFloat(n)<0 ? 'red' : 'muted';
const daysTo = ts => ts ? Math.ceil((ts*1000 - Date.now())/86400000) : null;
const timeAgo= ts => { const s=Math.round((Date.now()-ts)/1000); if(s<60) return `לפני ${s}ש׳`; if(s<3600) return `לפני ${Math.round(s/60)} דק׳`; return `לפני ${Math.round(s/3600)} שע׳`; };
const delay  = ms => new Promise(r=>setTimeout(r,ms));

function conLabel(r){
  const m={strongBuy:'STRONG BUY',buy:'BUY',hold:'HOLD',neutral:'NEUTRAL',sell:'SELL',strongSell:'STRONG SELL'};
  return m[r]||(r||'').toUpperCase()||'—';
}
function conColor(r){
  const l=(r||'').toLowerCase();
  if(l.includes('strongbuy')||l==='strong_buy'||l==='strongbuy') return 'green';
  if(l==='buy') return 'green';
  if(l==='hold'||l==='neutral') return 'amber';
  if(l.includes('sell')) return 'red';
  return 'muted';
}
function adjTarget(price, bullPct, neutralPct, bearPct){
  if(!price||isNaN(price)) return null;
  // Model: weighted implied upside
  // strongBull → +15%, neutral → +3%, bear → -5%
  const implied = (bullPct*0.15 + neutralPct*0.03 + bearPct*(-0.05)) / 100;
  return parseFloat((price*(1+implied)).toFixed(2));
}

// Progress bar
function setProgress(pct){
  const bar = document.getElementById('load-bar');
  const fill = document.getElementById('load-fill');
  if(!bar||!fill) return;
  if(pct>=100){ bar.classList.remove('active'); fill.style.width='0%'; return; }
  bar.classList.add('active');
  fill.style.width = pct+'%';
}

// ─── Finnhub Quote (primary price source — 60 calls/min free) ─────────
async function loadQuoteFinnhub(ticker){
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`);
    if(!r.ok) return false;
    const d = await r.json();
    if(!d || !d.c || d.c === 0) return false;
    state.quotes[ticker] = {
      price:    d.c,                        // current price
      chgPct:   d.dp,                       // % change
      chg:      d.d,                        // absolute change
      dayHigh:  d.h,
      dayLow:   d.l,
      open:     d.o,
      prevClose:d.pc,
      high52w:  0,
      low52w:   0,
      volume:   0,
      name:     ticker,
    };
    return true;
  } catch(e){ return false; }
}

// Twelve Data fallback for tickers that Finnhub couldn't load
// Free plan: 8 credits/min. Batch max 8.
async function loadQuotesTwelveBatch(tickers){
  if(!tickers.length) return;
  const symbols = tickers.slice(0,8).join(',');
  try {
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=${symbols}&apikey=${TWELVE_KEY}`);
    const data = await r.json();
    if(data.status==='error'||data.code===429) return; // rate limited — skip
    tickers.slice(0,8).forEach(t => {
      const d = data[t] || (data.symbol===t ? data : null);
      if(!d||d.status==='error') return;
      state.quotes[t] = {
        price:    parseFloat(d.close||0),
        chgPct:   parseFloat(d.percent_change||0),
        chg:      parseFloat(d.change||0),
        dayHigh:  parseFloat(d.high||0),
        dayLow:   parseFloat(d.low||0),
        high52w:  parseFloat((d.fifty_two_week||{}).high||0),
        low52w:   parseFloat((d.fifty_two_week||{}).low||0),
        open:     parseFloat(d.open||0),
        prevClose:parseFloat(d.previous_close||0),
        volume:   parseInt(d.volume||0),
        name:     d.name||t,
      };
    });
  } catch(e){}
}

async function loadAllQuotes(){
  // Load all tickers via Finnhub /quote in parallel batches of 15
  // (60 calls/min → 15 per 15s → safe margin)
  const BATCH = 15;
  let loaded = 0;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(async t => {
      const ok = await loadQuoteFinnhub(t);
      if(ok) loaded++;
    }));
    renderStocks(); // show data after each batch
    setProgress(Math.round(((i+BATCH)/TICKERS.length)*50)); // first 50% for quotes
    if(i+BATCH < TICKERS.length) await delay(1100); // safe spacing
  }

  // For any ticker that failed, try Twelve Data as fallback
  const missing = TICKERS.filter(t => !state.quotes[t] || state.quotes[t].price===0);
  if(missing.length > 0){
    await loadQuotesTwelveBatch(missing);
    if(missing.length > 8) await delay(62000); // wait for rate limit reset if needed
    if(missing.length > 8) await loadQuotesTwelveBatch(missing.slice(8));
    renderStocks();
  }
}

// ─── Finnhub: analyst recommendations + earnings ────────────────────
async function loadAnalystSingle(ticker){
  try {
    const [recResp, earnResp] = await Promise.all([
      fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${ticker}&from=2026-01-01&to=2027-12-31&token=${FINNHUB_KEY}`)
    ]);

    // Analyst recommendations
    if(recResp.ok){
      const recs = await recResp.json();
      const latest = Array.isArray(recs) && recs[0];
      if(latest){
        const sb=latest.strongBuy||0, b=latest.buy||0, h=latest.hold||0,
              s=latest.sell||0,     ss=latest.strongSell||0;
        const total = sb+b+h+s+ss;
        if(total > 0){
          const bullPct    = Math.round((sb+b)/total*100);
          const neutralPct = Math.round(h/total*100);
          const bearPct    = Math.round((s+ss)/total*100);
          const price      = state.quotes[ticker]?.price || 0;
          const target     = adjTarget(price, bullPct, neutralPct, bearPct);

          let rec = 'hold';
          if(bullPct >= 60) rec = bullPct>=80 ? 'strongBuy' : 'buy';
          else if(bearPct >= 40) rec = bearPct>=60 ? 'strongSell' : 'sell';

          state.analysts[ticker] = {
            recommendation: rec,
            numAnalysts: total,
            strongBuy:sb, buy:b, hold:h, sell:s, strongSell:ss,
            bullPct, neutralPct, bearPct,
            derivedTarget: target,
            period: latest.period
          };
        }
      }
    }

    // Earnings calendar
    if(earnResp.ok){
      const earn = await earnResp.json();
      const cal  = (earn.earningsCalendar||[]);
      const now  = Date.now()/1000;
      const upcoming = cal
        .filter(e => new Date(e.date).getTime()/1000 > now - 86400)
        .sort((a,b)=>new Date(a.date)-new Date(b.date));
      if(upcoming.length){
        const next = upcoming[0];
        state.earnings[ticker] = {
          date:        next.date,
          ts:          new Date(next.date).getTime()/1000,
          epsEstimate: next.epsEstimate,
          revEstimate: next.revenueEstimate
        };
      }
    }
  } catch(e){}
}

async function loadAllAnalysts(){
  // Finnhub free: 60 calls/min. 25 tickers × 2 calls = 50 calls.
  // Run in batches of 10 with 1.5s spacing.
  const BATCH = 10;
  for(let i=0; i<TICKERS.length; i+=BATCH){
    const chunk = TICKERS.slice(i, i+BATCH);
    await Promise.all(chunk.map(t => loadAnalystSingle(t)));
    const pct = 50 + Math.round(((i+BATCH)/TICKERS.length)*50);
    setProgress(Math.min(99, pct));
    renderAll();
    if(i+BATCH < TICKERS.length) await delay(1500);
  }
}

// ─── Refresh ──────────────────────────────────────────────────────────
async function refreshAll(){
  if(state.loading) return;
  state.loading = true;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  setProgress(5);

  // Show skeletons only on first ever load
  if(!Object.keys(state.quotes).length){
    document.getElementById('stocks-grid').innerHTML =
      Array.from({length:10}).map(()=>`<div class="skel" style="height:90px"></div>`).join('');
  }
  document.getElementById('footer-time').textContent = 'מעדכן...';

  try {
    // Phase 1: Load all prices via Finnhub /quote (fast, parallel)
    await loadAllQuotes();
    renderStocks();

    // Phase 2: Load analyst data + earnings via Finnhub
    await loadAllAnalysts();

    state.lastFetch = Date.now();
  } catch(e){
    console.error('Refresh error:', e);
  } finally {
    state.loading = false;
    btn.classList.remove('spinning');
    setProgress(100);
    renderAll();
    updateFooter();
  }
}

// ─── Render ───────────────────────────────────────────────────────────
function renderAll(){ renderKPIs(); renderStocks(); renderEarnings(); renderAnalysts(); }

function renderKPIs(){
  const tickers = Object.keys(state.quotes).filter(t=>state.quotes[t]?.price>0);
  const up   = tickers.filter(t=>(state.quotes[t]?.chgPct||0)>0).length;
  const down = tickers.filter(t=>(state.quotes[t]?.chgPct||0)<0).length;
  const earn = Object.values(state.earnings).filter(e=>{
    const d=daysTo(e.ts); return d!=null&&d>=0&&d<=14;
  }).length;
  document.getElementById('kpi-up').textContent   = tickers.length ? up   : '—';
  document.getElementById('kpi-down').textContent  = tickers.length ? down : '—';
  document.getElementById('kpi-earn').textContent  = earn || (Object.keys(state.earnings).length ? '0' : '—');
}

function renderStocks(){
  const filter = (document.getElementById('search-input')?.value||'').toLowerCase();
  const sort   = document.getElementById('sort-sel')?.value||'change';
  const grid   = document.getElementById('stocks-grid');

  // Keep skeletons while loading and no data yet
  if(!Object.keys(state.quotes).length){
    if(state.loading){
      grid.innerHTML = Array.from({length:10}).map(()=>`<div class="skel" style="height:90px"></div>`).join('');
    } else {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;font-size:13px">לא נטענו נתונים — לחץ רענן</div>`;
    }
    return;
  }

  let tickers = TICKERS.filter(t=>
    t.toLowerCase().includes(filter)||(state.quotes[t]?.name||'').toLowerCase().includes(filter));

  tickers.sort((a,b)=>{
    if(sort==='alpha')  return a.localeCompare(b);
    return (state.quotes[b]?.chgPct||0)-(state.quotes[a]?.chgPct||0);
  });

  grid.innerHTML = tickers.map(t=>{
    const q   = state.quotes[t]   || {};
    const a   = state.analysts[t] || {};
    const e   = state.earnings[t] || {};
    const price  = q.price  || 0;
    const chgPct = q.chgPct || 0;
    const days   = e.ts ? daysTo(e.ts) : null;
    const earnBadge = days===0?'היום':(days!=null&&days>0&&days<=7?`${days}י׳`:'');
    const target = a.derivedTarget || null;
    const upside = target&&price ? ((target-price)/price*100) : null;

    const priceStr = price>0 ? fmt$(price) : '<span class="muted" style="font-size:11px">טוען...</span>';

    return `<div class="card" onclick="openDetail('${t}')">
      <div class="card-top">
        <div class="card-left">
          <div class="sym">${t}${earnBadge?`<span class="earn-badge">${earnBadge}</span>`:''}</div>
          <div class="con ${conColor(a.recommendation)}">${a.numAnalysts>0?conLabel(a.recommendation):'&nbsp;'}</div>
        </div>
        <div class="card-right">
          <div class="price">${priceStr}</div>
          <div class="chg ${clr(chgPct)}">${price>0?fmtPct(chgPct):'—'}</div>
        </div>
      </div>
      ${target&&price?`<div class="card-extra">
        <span class="muted">יעד</span>
        <span class="${clr(upside)}">${fmt$(target)} (${fmtPct(upside)})</span>
      </div>`:''}`+
    `</div>`;
  }).join('');
}

function renderEarnings(){
  const el = document.getElementById('earnings-list');
  const entries = Object.entries(state.earnings)
    .filter(([,e])=>e.ts)
    .sort(([,a],[,b])=>a.ts-b.ts);

  if(!entries.length){
    el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">${state.loading?'טוען דוחות...':'אין דוחות מתוכננים'}</div>`;
    return;
  }

  const groups={};
  entries.forEach(([t,e])=>{
    const d=new Date(e.ts*1000);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key]) groups[key]=[];
    groups[key].push([t,e]);
  });

  el.innerHTML=Object.entries(groups).map(([key,rows])=>{
    const [yr,mo]=key.split('-');
    const hdr=`<div class="month-hdr">${MONTHS[parseInt(mo)-1]} ${yr}</div>`;
    const items=rows.map(([t,e])=>{
      const days=daysTo(e.ts);
      const cls=days===0?'today':(days!=null&&days>0&&days<=7?'soon':'');
      const badge=days===0?'<span class="earn-badge">היום</span>':(days!=null&&days>0&&days<=7?`<span class="earn-badge">${days}י׳</span>`:'');
      const eps = e.epsEstimate!=null&&e.epsEstimate!=='' ? `תחזית EPS: $${parseFloat(e.epsEstimate).toFixed(2)}` : '';
      return `<div class="earn-row ${cls}">
        <div class="earn-left">
          <div class="esym">${t} ${badge}</div>
          ${eps?`<div class="eeps">${eps}</div>`:''}
        </div>
        <div class="earn-right">
          <div class="edate">${e.date}</div>
          <div class="edays">${days===0?'היום!':days!=null&&days>0?`${days} ימים`:'עבר'}</div>
        </div>
      </div>`;
    }).join('');
    return hdr+`<div class="earn-list">${items}</div>`;
  }).join('');
}

function renderAnalysts(){
  const el=document.getElementById('analysts-list');
  const rows=Object.entries(state.analysts)
    .filter(([,a])=>a.numAnalysts>0)
    .map(([t,a])=>{
      const price=state.quotes[t]?.price||0;
      const target=a.derivedTarget||adjTarget(price, a.bullPct, a.neutralPct, a.bearPct);
      const upside=target&&price?((target-price)/price*100):null;
      return {t,a,target,upside};
    })
    .sort((x,y)=>(y.upside||0)-(x.upside||0));

  if(!rows.length){
    el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">${state.loading?'טוען אנליסטים...':'אין נתוני אנליסטים'}</div>`;
    return;
  }

  el.innerHTML=rows.map(({t,a,target,upside})=>`
    <div class="anal-row">
      <div class="anal-top">
        <div>
          <span class="anal-sym">${t}</span>
          <span class="anal-con ${conColor(a.recommendation)}">${conLabel(a.recommendation)}</span>
        </div>
        ${upside!=null?`<span style="font-size:16px;font-weight:700" class="${clr(upside)}">${fmtPct(upside)}</span>`:''}
      </div>
      <div class="bar">
        <div class="bar-bull" style="width:${a.bullPct}%"></div>
        <div class="bar-neu"  style="width:${a.neutralPct}%"></div>
        <div class="bar-bear" style="width:${a.bearPct}%"></div>
      </div>
      <div class="anal-meta">
        <span>${a.numAnalysts} אנליסטים • Bull ${a.bullPct}%</span>
        <span>יעד: <span class="${clr(upside)}">${target?fmt$(target):'—'}</span></span>
      </div>
    </div>`).join('');
}

// ─── Detail overlay ───────────────────────────────────────────────────
function openDetail(ticker){
  const q=state.quotes[ticker]||{};
  const a=state.analysts[ticker]||{};
  const e=state.earnings[ticker]||{};
  const price=q.price||0;
  const target=a.derivedTarget||null;
  const upside=target&&price?((target-price)/price*100):null;
  const days=e.ts?daysTo(e.ts):null;

  let html=`
    <div class="overlay-hdr">
      <div>
        <div class="overlay-sym">${ticker}</div>
        <div class="overlay-name">${q.name||ticker}</div>
        ${a.numAnalysts>0?`<div class="${conColor(a.recommendation)}" style="font-size:12px;font-weight:600;margin-top:3px">${conLabel(a.recommendation)} • ${a.numAnalysts} אנליסטים</div>`:''}
      </div>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>

    <div class="block">
      <div style="margin-bottom:12px">
        <div class="price-big">${fmt$(price)}</div>
        <div class="price-chg ${clr(q.chgPct)}">${fmt$(q.chg)} (${fmtPct(q.chgPct)}) היום</div>
      </div>
      ${q.dayLow&&q.dayHigh&&q.dayHigh>q.dayLow?`
        <div class="range-labels"><span>נמוך: ${fmt$(q.dayLow)}</span><span>גבוה: ${fmt$(q.dayHigh)}</span></div>
        <div class="range-bar"><div class="range-fill" style="width:${Math.min(100,Math.max(0,(price-q.dayLow)/(q.dayHigh-q.dayLow)*100))}%"></div></div>`:''}
      ${q.high52w&&q.low52w?`<div class="range-labels"><span>52W נמוך: ${fmt$(q.low52w)}</span><span>52W גבוה: ${fmt$(q.high52w)}</span></div>`:''}
      <div class="stats-grid" style="margin-top:10px">
        <div class="stat"><div class="stat-label">פתיחה</div><div class="stat-val">${fmt$(q.open)}</div></div>
        <div class="stat"><div class="stat-label">סגירה אתמול</div><div class="stat-val">${fmt$(q.prevClose)}</div></div>
        <div class="stat"><div class="stat-label">נפח</div><div class="stat-val">${q.volume?(q.volume/1e6).toFixed(1)+'M':'—'}</div></div>
      </div>
    </div>`;

  if(e.date){
    html+=`<div class="block">
      <div class="block-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        דוח רווחים הבא
      </div>
      <div style="font-size:22px;font-weight:700">${e.date}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${days===0?'היום!':days!=null&&days>0?`${days} ימים`:'עבר'}</div>
      ${e.epsEstimate!=null&&e.epsEstimate!==''?`<div style="font-size:12px;margin-top:8px;color:var(--muted)">תחזית EPS: <span style="color:var(--text);font-weight:600">$${parseFloat(e.epsEstimate).toFixed(2)}</span></div>`:''}
    </div>`;
  }

  if(a.numAnalysts>0){
    html+=`<div class="block">
      <div class="block-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        ניתוח אנליסטים
      </div>
      <div class="bar" style="height:10px;margin-bottom:8px">
        <div class="bar-bull" style="width:${a.bullPct}%"></div>
        <div class="bar-neu"  style="width:${a.neutralPct}%"></div>
        <div class="bar-bear" style="width:${a.bearPct}%"></div>
      </div>
      <div class="breakdown-row"><span class="green">Strong Buy + Buy</span><span class="green">${a.strongBuy+a.buy} (${a.bullPct}%)</span></div>
      <div class="breakdown-row"><span class="amber">Hold</span><span class="amber">${a.hold} (${a.neutralPct}%)</span></div>
      <div class="breakdown-row"><span class="red">Sell + Strong Sell</span><span class="red">${a.sell+a.strongSell} (${a.bearPct}%)</span></div>
      <div style="margin-top:12px">
        <div class="targets-grid">
          <div class="target-box">
            <div class="target-label">יעד מותאם*</div>
            <div class="target-val ${clr(upside)}">${target?fmt$(target):'—'}</div>
            ${upside!=null?`<div style="font-size:11px" class="${clr(upside)}">${fmtPct(upside)} מהמחיר</div>`:''}
          </div>
          <div class="target-box">
            <div class="target-label">פוטנציאל Bull</div>
            <div class="target-val green">${price?fmt$(price*1.15):'—'}</div>
            <div style="font-size:11px;color:var(--muted)">+15% upside</div>
          </div>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:4px">* יעד = שקלול לפי % Bull × 15% + % Neutral × 3% + % Bear × (−5%)</div>
      </div>
    </div>`;
  }

  document.getElementById('overlay-inner').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function switchTab(tab){
  currentTab=tab;
  ['stocks','earnings','analysts'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['stocks','earnings','analysts'][i]===tab);
  });
}

function updateFooter(){
  const cnt=Object.keys(state.quotes).filter(t=>state.quotes[t]?.price>0).length;
  document.getElementById('footer-count').textContent=cnt?`${cnt} מניות טעונות`:'';
  if(state.lastFetch){
    document.getElementById('footer-time').textContent=`עודכן ${timeAgo(state.lastFetch)} • רענון כל 5 דק׳`;
    document.getElementById('last-update').innerHTML=
      `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${timeAgo(state.lastFetch)}`;
  }
}

// Auto-refresh every 5 minutes
setInterval(()=>{ if(!state.loading) refreshAll(); }, 300000);
setInterval(updateFooter, 30000);

// Boot
refreshAll();
</script>
</body>
</html>
