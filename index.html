<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<link rel="manifest" href="manifest.json">
<title>Portfolio Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;
    --border:#2a2e42;--text:#e8eaf6;--muted:#6b7280;
    --green:#10b981;--red:#ef4444;--amber:#f59e0b;
    --blue:#6366f1;--accent:#818cf8;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

  header{position:sticky;top:0;z-index:50;background:rgba(15,17,23,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px}
  .header-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
  .logo svg{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:8px}
  .time-badge{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .btn-refresh{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
  .btn-refresh:hover{background:var(--bg3)}
  .btn-refresh.spinning svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  main{max-width:500px;margin:0 auto;padding:12px 12px 80px}

  .kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
  .kpi-val{font-size:22px;font-weight:700;line-height:1}
  .kpi-label{font-size:10px;color:var(--muted);margin-top:3px}

  .tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px;margin-bottom:12px;gap:2px}
  .tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--muted);transition:.2s;border:none;background:none}
  .tab.active{background:var(--bg3);color:var(--text)}

  .controls{display:flex;gap:8px;margin-bottom:10px}
  .search{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
  .search:focus{border-color:var(--accent)}
  .sort-sel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12px;outline:none}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;user-select:none}
  .card:active{transform:scale(.97)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .card-left .sym{font-weight:700;font-size:13px}
  .card-left .con{font-size:10px;font-weight:600;margin-top:2px}
  .card-right .price{font-weight:700;font-size:13px;text-align:left}
  .card-right .chg{font-size:11px;font-weight:600;text-align:left}
  .card-ah{display:flex;justify-content:space-between;font-size:10px;margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}
  .card-target{display:flex;justify-content:space-between;font-size:10px;margin-top:4px}
  .earn-badge{font-size:9px;font-weight:700;background:rgba(245,158,11,.15);color:var(--amber);padding:1px 5px;border-radius:4px;margin-right:4px}

  .earn-list{display:flex;flex-direction:column;gap:6px}
  .earn-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
  .earn-row.today{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3)}
  .earn-row.soon{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.2)}
  .earn-left .esym{font-weight:700;font-size:14px}
  .earn-left .eprev{font-size:10px;color:var(--muted);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .earn-right{text-align:left}
  .earn-right .edate{font-size:12px;font-weight:600}
  .earn-right .edays{font-size:10px;color:var(--muted);margin-top:2px}
  .month-hdr{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px 4px}

  .anal-list{display:flex;flex-direction:column;gap:8px}
  .anal-row{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px}
  .anal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .anal-sym{font-weight:700;font-size:14px}
  .anal-con{font-size:11px;font-weight:600;margin-right:6px}
  .anal-upside{font-size:16px;font-weight:700}
  .bar{height:6px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:4px}
  .bar-bull{background:var(--green);height:100%}
  .bar-neu{background:var(--amber);height:100%}
  .bar-bear{background:var(--red);height:100%}
  .anal-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}

  .overlay{position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;display:none}
  .overlay.open{display:block}
  .overlay-inner{max-width:500px;margin:0 auto;padding:16px 16px 80px}
  .overlay-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .overlay-sym{font-size:22px;font-weight:700}
  .overlay-name{font-size:11px;color:var(--muted);margin-top:2px}
  .btn-close{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px}

  .block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
  .block-title{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;margin-bottom:10px;color:var(--accent)}
  .price-big{font-size:28px;font-weight:700}
  .price-chg{font-size:14px;font-weight:600;margin-top:2px}
  .range-bar{height:6px;background:var(--bg3);border-radius:3px;position:relative;margin:8px 0}
  .range-fill{height:100%;background:var(--accent);border-radius:3px;position:absolute;top:0;left:0}
  .range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stat{background:var(--bg3);border-radius:10px;padding:8px}
  .stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
  .stat-val{font-size:13px;font-weight:700}
  .targets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .target-box{background:var(--bg3);border-radius:10px;padding:10px}
  .target-label{font-size:10px;color:var(--muted);margin-bottom:4px}
  .target-val{font-size:16px;font-weight:700}

  footer{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px 16px}
  .footer-inner{max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}

  .skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .error-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#ef4444;margin-bottom:10px;display:none}

  .green{color:var(--green)} .red{color:var(--red)} .amber{color:var(--amber)} .blue{color:var(--blue)} .accent{color:var(--accent)} .muted{color:var(--muted)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Portfolio Tracker
    </div>
    <div class="header-right">
      <span class="time-badge" id="last-update">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        טוען...
      </span>
      <button class="btn-refresh" id="btn-refresh" onclick="refreshAll()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        רענן
      </button>
    </div>
  </div>
</header>

<main>
  <div id="error-banner" class="error-banner"></div>

  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-val green" id="kpi-up">—</div><div class="kpi-label">עולות</div></div>
    <div class="kpi"><div class="kpi-val red" id="kpi-down">—</div><div class="kpi-label">יורדות</div></div>
    <div class="kpi"><div class="kpi-val amber" id="kpi-earn">—</div><div class="kpi-label">דוחות קרובים</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stocks')">מניות</button>
    <button class="tab" onclick="switchTab('earnings')">דוחות</button>
    <button class="tab" onclick="switchTab('analysts')">אנליסטים</button>
  </div>

  <div id="tab-stocks">
    <div class="controls">
      <input class="search" type="search" placeholder="חפש מניה..." oninput="renderStocks()" id="search-input">
      <select class="sort-sel" onchange="renderStocks()" id="sort-sel">
        <option value="change">שינוי%</option>
        <option value="alpha">A-Z</option>
        <option value="cap">שווי שוק</option>
      </select>
    </div>
    <div class="grid" id="stocks-grid"></div>
  </div>

  <div id="tab-earnings" style="display:none">
    <div id="earnings-list"></div>
  </div>

  <div id="tab-analysts" style="display:none">
    <div class="anal-list" id="analysts-list"></div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="overlay-inner" id="overlay-inner"></div>
</div>

<footer>
  <div class="footer-inner">
    <span id="footer-time">טוען נתונים...</span>
    <span id="footer-count" class="accent"></span>
  </div>
</footer>

<script>
const TICKERS = ['AMD','TSM','ORCL','STLD','AAPL','EXE','GOOGL','MSFT','AA','QQQ','AMP','FLR','CMCSA','PYPL','WMT','MRK','TSLA','KFY','SAR','BIDU','COST','SNY','IBM','HPQ','WIMI'];
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// Yahoo Finance endpoints (no API key needed, works from phone browser)
const YQ1 = 'https://query1.finance.yahoo.com';
const YQ2 = 'https://query2.finance.yahoo.com';

let state = {
  quotes: {},      // { ticker: { price, chg, chgPct, dayHigh, dayLow, 52wHigh, 52wLow, name, marketCap, open, prevClose, prePrice, prePct, postPrice, postPct } }
  earnings: {},    // { ticker: { date, epsEst, revenueEst } }
  analysts: {},    // { ticker: { targetMean, targetHigh, targetLow, recommendation, numAnalysts, strongBuy, buy, hold, sell, strongSell } }
  crumb: null,
  lastFetch: 0,
  loading: false,
  errors: []
};

// ─── Formatters ─────────────────────────────────────────────────────
function fmt$(n){ return (n != null && n !== '' && !isNaN(n)) ? '$'+parseFloat(n).toFixed(2) : '—'; }
function fmtPct(n){ if(n==null||isNaN(n)) return '—'; const v=parseFloat(n); return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function fmtCap(n){ if(!n||isNaN(n)) return '—'; if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B'; return '$'+(n/1e6).toFixed(0)+'M'; }
function colorPct(n){ if(n==null||isNaN(n)) return 'muted'; return parseFloat(n)>0?'green':parseFloat(n)<0?'red':'muted'; }
function daysUntil(ts){ if(!ts) return null; return Math.ceil((ts*1000 - Date.now())/86400000); }
function timeAgo(ts){ const s=Math.round((Date.now()-ts)/1000); if(s<60) return `לפני ${s}ש׳`; if(s<3600) return `לפני ${Math.round(s/60)} דק׳`; return `לפני ${Math.round(s/3600)} שע׳`; }
function consensusColor(c){ const l=(c||'').toLowerCase(); if(l.includes('strong_buy')||l.includes('strongbuy')) return 'green'; if(l.includes('buy')) return 'green'; if(l.includes('hold')||l.includes('neutral')||l.includes('outperform')) return 'amber'; if(l.includes('sell')) return 'red'; return 'muted'; }
function consensusLabel(c){ const m={'strong_buy':'STRONG BUY','buy':'BUY','hold':'HOLD','neutral':'NEUTRAL','outperform':'OUTPERFORM','underperform':'UNDERPERFORM','sell':'SELL','strong_sell':'STRONG SELL'}; return m[c]||((c||'').toUpperCase())||'—'; }
function adjTarget(avg, price, bull){ if(!avg||!price||isNaN(avg)||isNaN(price)) return null; const b=bull/100; return avg*b + price*(1-b)*0.6 + avg*(1-b)*0.4; }

// ─── Yahoo Finance API ───────────────────────────────────────────────

// Step 1: Get crumb (needed for quoteSummary — browser auto-sends cookies)
async function getCrumb() {
  if (state.crumb) return state.crumb;
  try {
    const r = await fetch(`${YQ1}/v1/test/getcrumb`, { credentials: 'include' });
    if (!r.ok) throw new Error('crumb fail');
    const crumb = await r.text();
    if (crumb && !crumb.includes('{') && crumb.length < 50) {
      state.crumb = crumb;
      return crumb;
    }
  } catch(e) {}
  // Try query2
  try {
    const r = await fetch(`${YQ2}/v1/test/getcrumb`, { credentials: 'include' });
    if (r.ok) {
      const crumb = await r.text();
      if (crumb && !crumb.includes('{') && crumb.length < 50) {
        state.crumb = crumb;
        return crumb;
      }
    }
  } catch(e) {}
  return null;
}

// Step 2: Fetch price data via v8 chart (no auth needed, works from any browser)
async function fetchChart(ticker) {
  try {
    const url = `${YQ2}/v8/finance/chart/${ticker}?interval=1d&range=5d&includePrePost=true`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${r.status}`);
    const d = await r.json();
    const result = d?.chart?.result?.[0];
    if (!result) throw new Error('no result');
    const meta = result.meta;

    const price   = meta.regularMarketPrice ?? 0;
    const prev    = meta.chartPreviousClose ?? meta.regularMarketPreviousClose ?? price;
    const chg     = price - prev;
    const chgPct  = prev ? (chg / prev * 100) : 0;

    // Pre/post market — from chart events or meta
    let prePrice=null, prePct=null, postPrice=null, postPct=null;
    const hasPrePost = meta.hasPrePostMarketData;
    // Look in quotes array (last entry may be pre/post)
    const quotes = result.indicators?.quote?.[0];
    const timestamps = result.timestamp || [];
    const ctp = meta.currentTradingPeriod || {};
    const now = Math.floor(Date.now()/1000);
    const regularEnd = ctp.regular?.end ?? 0;
    const preStart   = ctp.pre?.start ?? 0;
    const preEnd     = ctp.pre?.end ?? 0;
    const postStart  = ctp.post?.start ?? 0;
    const postEnd    = ctp.post?.end ?? 0;

    if (hasPrePost && quotes?.close) {
      // Scan timestamps for pre/post prices
      for (let i = timestamps.length-1; i >= 0; i--) {
        const ts = timestamps[i];
        const c  = quotes.close[i];
        if (!c || isNaN(c)) continue;
        if (ts >= postStart && ts < postEnd) {
          postPrice = c;
          postPct   = price ? ((c - price) / price * 100) : null;
        } else if (ts >= preStart && ts < preEnd) {
          prePrice  = c;
          prePct    = price ? ((c - price) / price * 100) : null;
        }
      }
    }

    return {
      price, chg, chgPct,
      dayHigh:  meta.regularMarketDayHigh,
      dayLow:   meta.regularMarketDayLow,
      high52w:  meta.fiftyTwoWeekHigh,
      low52w:   meta.fiftyTwoWeekLow,
      name:     meta.longName || meta.shortName || ticker,
      marketCap:meta.marketCap,
      open:     meta.regularMarketOpen,
      prevClose:prev,
      prePrice, prePct, postPrice, postPct
    };
  } catch(e) {
    return null;
  }
}

// Step 3: Fetch analyst + earnings data via quoteSummary
async function fetchSummary(ticker, crumb) {
  const modules = 'financialData,recommendationTrend,calendarEvents';
  const crumbParam = crumb ? `&crumb=${encodeURIComponent(crumb)}` : '';

  for (const host of [YQ1, YQ2]) {
    try {
      const url = `${host}/v10/finance/quoteSummary/${ticker}?modules=${encodeURIComponent(modules)}${crumbParam}`;
      const r = await fetch(url, { credentials: 'include' });
      if (!r.ok) continue;
      const d = await r.json();
      const res = d?.quoteSummary?.result?.[0];
      if (!res) continue;

      const fin = res.financialData || {};
      const cal = res.calendarEvents?.earnings || {};
      const trend = res.recommendationTrend?.trend || [];
      const latest = trend[0] || {};

      const strongBuy   = latest.strongBuy   || 0;
      const buy         = latest.buy         || 0;
      const hold        = latest.hold        || 0;
      const sell        = latest.sell        || 0;
      const strongSell  = latest.strongSell  || 0;
      const total       = strongBuy + buy + hold + sell + strongSell;

      const earningsDates = (cal.earningsDate || []).map(e => e.raw || e);
      const nextEarnings  = earningsDates.find(ts => ts * 1000 > Date.now() - 86400000);

      return {
        targetMean:     fin.targetMeanPrice?.raw ?? null,
        targetHigh:     fin.targetHighPrice?.raw ?? null,
        targetLow:      fin.targetLowPrice?.raw  ?? null,
        recommendation: fin.recommendationKey    || 'hold',
        numAnalysts:    fin.numberOfAnalystOpinions?.raw ?? total,
        strongBuy, buy, hold, sell, strongSell,
        bullPct:    total ? Math.round((strongBuy+buy)/total*100)  : 0,
        neutralPct: total ? Math.round(hold/total*100)             : 0,
        bearPct:    total ? Math.round((sell+strongSell)/total*100): 0,
        earningsTs: nextEarnings || earningsDates[0] || null
      };
    } catch(e) {}
  }
  return null;
}

// ─── Load all data ───────────────────────────────────────────────────

async function loadAll() {
  // Get crumb first (one request, then reuse)
  const crumb = await getCrumb();

  // Fetch all tickers in parallel — chart first, then quoteSummary
  await Promise.all(TICKERS.map(async ticker => {
    const [chartData, summaryData] = await Promise.all([
      fetchChart(ticker),
      fetchSummary(ticker, crumb)
    ]);

    if (chartData) state.quotes[ticker] = chartData;

    if (summaryData) {
      state.analysts[ticker] = summaryData;
      if (summaryData.earningsTs) {
        state.earnings[ticker] = { ts: summaryData.earningsTs };
      }
    }
  }));
}

// ─── Refresh ─────────────────────────────────────────────────────────

async function refreshAll() {
  if (state.loading) return;
  state.loading = true;
  state.crumb   = null; // reset crumb each refresh
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  document.getElementById('footer-time').textContent = 'מעדכן...';
  document.getElementById('error-banner').style.display = 'none';

  // Show skeletons immediately
  if (!Object.keys(state.quotes).length) {
    document.getElementById('stocks-grid').innerHTML =
      Array.from({length:10}).map(()=>`<div class="skel" style="height:90px"></div>`).join('');
  }

  try {
    await loadAll();
    state.lastFetch = Date.now();
    const count = Object.keys(state.quotes).length;
    if (count === 0) showError('לא ניתן לטעון נתונים. בדוק חיבור לאינטרנט ונסה שוב.');
    else if (count < TICKERS.length) showError(`נטענו ${count}/${TICKERS.length} מניות. חלק מהנתונים חסרים.`);
  } catch(e) {
    showError('שגיאה בטעינת נתונים: ' + e.message);
  } finally {
    state.loading = false;
    btn.classList.remove('spinning');
    renderAll();
    updateFooter();
  }
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─── Render ───────────────────────────────────────────────────────────

function renderAll() {
  renderKPIs();
  renderStocks();
  renderEarnings();
  renderAnalysts();
}

function renderKPIs() {
  const tickers = Object.keys(state.quotes);
  const up   = tickers.filter(t => (state.quotes[t]?.chgPct||0) > 0).length;
  const down = tickers.filter(t => (state.quotes[t]?.chgPct||0) < 0).length;
  const now  = Date.now()/1000;
  const earn = Object.values(state.earnings).filter(e => {
    if (!e.ts) return false;
    const d = daysUntil(e.ts);
    return d !== null && d >= 0 && d <= 14;
  }).length;
  document.getElementById('kpi-up').textContent   = tickers.length ? up   : '—';
  document.getElementById('kpi-down').textContent  = tickers.length ? down : '—';
  document.getElementById('kpi-earn').textContent  = Object.keys(state.earnings).length ? earn : '—';
}

function renderStocks() {
  const filter = (document.getElementById('search-input')?.value||'').toLowerCase();
  const sort   = document.getElementById('sort-sel')?.value||'change';
  const grid   = document.getElementById('stocks-grid');

  let tickers = TICKERS.filter(t => t.toLowerCase().includes(filter) ||
    (state.quotes[t]?.name||'').toLowerCase().includes(filter));

  tickers.sort((a,b) => {
    if (sort==='alpha')  return a.localeCompare(b);
    if (sort==='change') return (state.quotes[b]?.chgPct||0) - (state.quotes[a]?.chgPct||0);
    if (sort==='cap')    return (state.quotes[b]?.marketCap||0) - (state.quotes[a]?.marketCap||0);
    return 0;
  });

  if (!Object.keys(state.quotes).length) {
    grid.innerHTML = Array.from({length:10}).map(()=>`<div class="skel" style="height:90px"></div>`).join('');
    return;
  }

  grid.innerHTML = tickers.map(t => {
    const q   = state.quotes[t]   || {};
    const a   = state.analysts[t] || {};
    const e   = state.earnings[t] || {};
    const price   = q.price ?? 0;
    const chgPct  = q.chgPct ?? 0;

    // After/pre market — prefer post, fall back to pre
    const ahPrice = q.postPrice ?? q.prePrice ?? null;
    const ahPct   = q.postPrice!=null ? q.postPct : (q.prePrice!=null ? q.prePct : null);
    const ahLabel = q.postPrice!=null ? 'Post' : (q.prePrice!=null ? 'Pre' : '');

    const days = e.ts != null ? daysUntil(e.ts) : null;
    const earnBadge = days===0 ? 'היום' : (days!=null&&days>0&&days<=7 ? `${days}י׳` : '');

    const avg    = a.targetMean ? parseFloat(a.targetMean) : null;
    const adj    = adjTarget(avg, price, a.bullPct||0);
    const upside = adj&&price ? ((adj-price)/price*100) : null;

    return `<div class="card" onclick="openDetail('${t}')">
      <div class="card-top">
        <div class="card-left">
          <div class="sym">${t}${earnBadge?`<span class="earn-badge">${earnBadge}</span>`:''}</div>
          ${a.numAnalysts>0?`<div class="con ${consensusColor(a.recommendation)}">${consensusLabel(a.recommendation)}</div>`:
            `<div class="con muted">&nbsp;</div>`}
        </div>
        <div class="card-right">
          <div class="price">${price?fmt$(price):'—'}</div>
          <div class="chg ${colorPct(chgPct)}">${fmtPct(chgPct)}</div>
        </div>
      </div>
      ${ahPrice!=null?`<div class="card-ah">
        <span class="muted">${ahLabel} Hours</span>
        <span class="${colorPct(ahPct)}">${fmt$(ahPrice)} ${ahPct!=null?`(${fmtPct(ahPct)})`:''}  </span>
      </div>`:''}
      ${avg&&price?`<div class="card-target">
        <span class="muted">יעד</span>
        <span>${fmt$(adj)} <span class="${colorPct(upside)}">(${fmtPct(upside)})</span></span>
      </div>`:''}
    </div>`;
  }).join('');
}

function renderEarnings() {
  const el    = document.getElementById('earnings-list');
  const now   = Date.now() / 1000;

  const entries = Object.entries(state.earnings)
    .filter(([, e]) => e.ts)
    .sort(([, a], [, b]) => a.ts - b.ts);

  if (!entries.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">אין נתוני דוחות זמינים</div>';
    return;
  }

  const groups = {};
  entries.forEach(([t, e]) => {
    const d   = new Date(e.ts * 1000);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push([t, e]);
  });

  el.innerHTML = Object.entries(groups).map(([key, rows]) => {
    const [yr, mo] = key.split('-');
    const header = `<div class="month-hdr">${MONTHS[parseInt(mo)-1]} ${yr}</div>`;
    const items = rows.map(([t, e]) => {
      const days = daysUntil(e.ts);
      const cls  = days===0 ? 'today' : (days!=null&&days>0&&days<=7 ? 'soon' : '');
      const badge= days===0 ? '<span class="earn-badge">היום</span>' :
                   (days!=null&&days>0&&days<=7 ? `<span class="earn-badge">${days}י׳</span>` : '');
      const dateStr = new Date(e.ts*1000).toISOString().slice(0,10);
      return `<div class="earn-row ${cls}">
        <div class="earn-left">
          <div class="esym">${t} ${badge}</div>
        </div>
        <div class="earn-right">
          <div class="edate">${dateStr}</div>
          <div class="edays">${days===0?'היום':days!=null&&days>0?`${days} ימים`:'דווח'}</div>
        </div>
      </div>`;
    }).join('');
    return header + `<div class="earn-list">${items}</div>`;
  }).join('');
}

function renderAnalysts() {
  const el   = document.getElementById('analysts-list');
  const rows = Object.entries(state.analysts)
    .filter(([, a]) => a.targetMean && a.numAnalysts > 0)
    .map(([t, a]) => {
      const price  = state.quotes[t]?.price || 0;
      const adj    = adjTarget(parseFloat(a.targetMean||0), price, a.bullPct||0);
      const upside = adj && price ? ((adj-price)/price*100) : null;
      return { t, a, adj, upside };
    })
    .sort((x, y) => (y.upside||0) - (x.upside||0));

  if (!rows.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">טוען נתוני אנליסטים...</div>';
    return;
  }

  el.innerHTML = rows.map(({ t, a, adj, upside }) => `
    <div class="anal-row">
      <div class="anal-top">
        <div>
          <span class="anal-sym">${t}</span>
          <span class="anal-con ${consensusColor(a.recommendation)}">${consensusLabel(a.recommendation)}</span>
        </div>
        ${upside!=null?`<span class="anal-upside ${colorPct(upside)}">${fmtPct(upside)}</span>`:''}
      </div>
      <div class="bar">
        <div class="bar-bull" style="width:${a.bullPct}%"></div>
        <div class="bar-neu"  style="width:${a.neutralPct}%"></div>
        <div class="bar-bear" style="width:${a.bearPct}%"></div>
      </div>
      <div class="anal-meta">
        <span>${a.numAnalysts} דירוגים • Bull ${a.bullPct}%</span>
        <span>יעד מותאם: <span class="${colorPct(upside)}">${adj?fmt$(adj):'—'}</span></span>
      </div>
    </div>`).join('');
}

// ─── Detail overlay ───────────────────────────────────────────────────

function openDetail(ticker) {
  const q = state.quotes[ticker]   || {};
  const a = state.analysts[ticker] || {};
  const e = state.earnings[ticker] || {};

  const price  = q.price  ?? 0;
  const chg    = q.chg    ?? 0;
  const chgPct = q.chgPct ?? 0;
  const avg    = a.targetMean ? parseFloat(a.targetMean) : null;
  const adj    = adjTarget(avg, price, a.bullPct||0);
  const upside = adj&&price ? ((adj-price)/price*100) : null;
  const days   = e.ts != null ? daysUntil(e.ts) : null;

  const ahPrice = q.postPrice ?? q.prePrice ?? null;
  const ahPct   = q.postPrice!=null ? q.postPct : (q.prePrice!=null ? q.prePct : null);
  const ahLabel = q.postPrice!=null ? 'After Hours (Post)' : 'Pre Market';

  let html = `
    <div class="overlay-hdr">
      <div>
        <div class="overlay-sym">${ticker}</div>
        <div class="overlay-name">${q.name||''}</div>
        ${a.numAnalysts>0?`<div class="${consensusColor(a.recommendation)}" style="font-size:12px;font-weight:600;margin-top:2px">${consensusLabel(a.recommendation)}</div>`:''}
      </div>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>

    <div class="block">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="price-big">${price?fmt$(price):'—'}</div>
          <div class="price-chg ${colorPct(chgPct)}">${fmt$(chg)} (${fmtPct(chgPct)})</div>
        </div>
        ${ahPrice!=null?`<div style="text-align:left">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${ahLabel}</div>
          <div style="font-size:20px;font-weight:700" class="${colorPct(ahPct)}">${fmt$(ahPrice)}</div>
          <div style="font-size:12px" class="${colorPct(ahPct)}">${fmtPct(ahPct)}</div>
        </div>`:''}
      </div>
      ${q.dayLow&&q.dayHigh?`
        <div class="range-labels" style="margin-top:12px"><span>נמוך: ${fmt$(q.dayLow)}</span><span>גבוה: ${fmt$(q.dayHigh)}</span></div>
        <div class="range-bar"><div class="range-fill" style="width:${Math.min(100,Math.max(0,((price-q.dayLow)/(q.dayHigh-q.dayLow))*100))}%"></div></div>
        <div class="range-labels"><span>52W נמוך: ${fmt$(q.low52w)}</span><span>52W גבוה: ${fmt$(q.high52w)}</span></div>
      `:''}
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">שווי שוק</div><div class="stat-val">${fmtCap(q.marketCap)}</div></div>
        <div class="stat"><div class="stat-label">פתיחה</div><div class="stat-val">${fmt$(q.open)}</div></div>
        <div class="stat"><div class="stat-label">סגירה קודמת</div><div class="stat-val">${fmt$(q.prevClose)}</div></div>
      </div>
    </div>`;

  if (e.ts) {
    const dateStr = new Date(e.ts*1000).toISOString().slice(0,10);
    html += `<div class="block">
      <div class="block-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        דוח רווחים קרוב
      </div>
      <div style="font-size:20px;font-weight:700">${dateStr}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${days===0?'היום!':days!=null&&days>0?`${days} ימים`:'דווח'}</div>
    </div>`;
  }

  if (a.numAnalysts > 0) {
    html += `<div class="block">
      <div class="block-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        ניתוח אנליסטים (${a.numAnalysts} דירוגים)
      </div>
      <div class="bar" style="height:8px;margin-bottom:6px">
        <div class="bar-bull" style="width:${a.bullPct}%"></div>
        <div class="bar-neu"  style="width:${a.neutralPct}%"></div>
        <div class="bar-bear" style="width:${a.bearPct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:12px">
        <span class="green">Bull ${a.bullPct}%</span>
        <span class="amber">Neutral ${a.neutralPct}%</span>
        <span class="red">Bear ${a.bearPct}%</span>
      </div>
      <div class="targets-grid">
        <div class="target-box"><div class="target-label">יעד ממוצע</div><div class="target-val">${avg?fmt$(avg):'—'}</div></div>
        <div class="target-box"><div class="target-label">יעד מותאם*</div><div class="target-val ${colorPct(upside)}">${adj?fmt$(adj):'—'} ${upside!=null?`<span style="font-size:11px">(${fmtPct(upside)})</span>`:''}</div></div>
        <div class="target-box"><div class="target-label">יעד נמוך</div><div class="target-val">${fmt$(a.targetLow)}</div></div>
        <div class="target-box"><div class="target-label">יעד גבוה</div><div class="target-val">${fmt$(a.targetHigh)}</div></div>
      </div>
      <div style="font-size:9px;color:var(--muted)">* יעד מותאם = ממוצע × דיוק + מחיר × (1−דיוק) × 0.6</div>
    </div>`;
  }

  document.getElementById('overlay-inner').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function switchTab(tab) {
  currentTab = tab;
  ['stocks','earnings','analysts'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['stocks','earnings','analysts'][i]===tab);
  });
}
let currentTab = 'stocks';

function updateFooter() {
  const count = Object.keys(state.quotes).length;
  document.getElementById('footer-count').textContent = count ? `${count} מניות` : '';
  if (state.lastFetch) {
    document.getElementById('footer-time').textContent = `עודכן ${timeAgo(state.lastFetch)} • רענון כל 2 דק׳`;
    document.getElementById('last-update').innerHTML =
      `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${timeAgo(state.lastFetch)}`;
  }
}

// Auto-refresh every 2 minutes
setInterval(() => { if (!state.loading) refreshAll(); }, 120000);
setInterval(updateFooter, 20000);

// Start
refreshAll();
</script>
</body>
</html>
